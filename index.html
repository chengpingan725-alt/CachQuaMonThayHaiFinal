                ],

            {

                    "b. Cài đặt và cấu hình chính sách nhóm từng đối tượng.",

                    "c. Giám sát các sự kiện và giám sát mạng.",

            {
                question: "Câu 83. Thao tác nào dưới đây có thể tự động hóa trên hệ thống?",

                    "a. Đặt lại mật khẩu (Password resets).",

                    "c. Quét đĩa đang dùng (Disk usage scans).",

            {
                question: "Câu 84. Công nghệ ảo hoá (Virtualization technology) là gì?",
                options: [
                    "a. Là sử dụng phần mềm mô phỏng chức năng phần cứng để tạo ra một hệ thống ảo hóa.",
                    "b. Công nghệ không có thực.",
                    "c. Công nghệ phần mềm điều khiển phần cứng.",
                    "d. Các phương án đã trả lời đều sai."
                ],
                correctAnswer: 0
            }
        ];

       const container = document.getElementById('quiz-container');

        // Hàm render câu hỏi
        function renderQuiz() {
            quizData.forEach((item, index) => {
                if (item.chapter) {
                    const chapterEl = document.createElement('div');
                    chapterEl.className = 'chapter-title';
                    chapterEl.innerText = item.chapter;
                    container.appendChild(chapterEl);
                }

                const card = document.createElement('div');
                card.className = 'question-card';

                const questionTitle = document.createElement('div');
                questionTitle.className = 'question-title';
                questionTitle.innerText = item.question;
                card.appendChild(questionTitle);

                const optionsList = document.createElement('ul');
                optionsList.className = 'options';
                optionsList.id = 'options_' + index;

                item.options.forEach((opt, optIndex) => {
                    const li = document.createElement('li');
                    
                    const label = document.createElement('label');
                    label.id = `label_${index}_${optIndex}`;
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'question_' + index;
                    radio.value = optIndex;
                    
                    // Lắng nghe sự kiện click chọn đáp án
                    radio.onchange = () => checkAnswer(index, optIndex);

                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(opt));
                    li.appendChild(label);
                    optionsList.appendChild(li);
                });

                card.appendChild(optionsList);

                // Khu vực hiển thị thông báo Đúng/Sai
                const feedbackDiv = document.createElement('div');
                feedbackDiv.id = 'feedback_' + index;
                feedbackDiv.className = 'feedback';
                card.appendChild(feedbackDiv);

                container.appendChild(card);
            });
        }

        // Hàm kiểm tra đáp án ngay lập tức
        function checkAnswer(questionIndex, selectedOptionIndex) {
            const item = quizData[questionIndex];
            const optionsList = document.getElementById('options_' + questionIndex);
            const radios = optionsList.getElementsByTagName('input');
            const feedback = document.getElementById('feedback_' + questionIndex);

            // Vô hiệu hóa tất cả radio của câu này để người dùng không đổi lại được
            for (let r of radios) {
                r.disabled = true;
            }

            // Gỡ bỏ tất cả màu sắc cũ nếu có
            for (let i = 0; i < item.options.length; i++) {
                document.getElementById(`label_${questionIndex}_${i}`).classList.remove('correct', 'incorrect');
            }

            const selectedLabel = document.getElementById(`label_${questionIndex}_${selectedOptionIndex}`);
            const correctLabel = document.getElementById(`label_${questionIndex}_${item.correctAnswer}`);

            if (selectedOptionIndex === item.correctAnswer) {
                selectedLabel.classList.add('correct');
                feedback.innerHTML = '<span style="color: #27ae60;">✔ BẠN ĐÃ TRẢ LỜI ĐÚNG!</span>';
            } else {
                selectedLabel.classList.add('incorrect');
                correctLabel.classList.add('correct'); // Highlight luôn đáp án đúng để người dùng biết
                feedback.innerHTML = '<span style="color: #e74c3c;">✘ SAI RỒI! (Đáp án nền xanh mới là đúng)</span>';
            }
            
            feedback.classList.add('show');
        }

        // Khởi chạy
        renderQuiz();
    </script>
